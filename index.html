<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>南京铭望 H5 页面入口</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f3f6fa;
      color: #172033;
      font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
    }
    main {
      width: min(420px, calc(100% - 32px));
      background: #fff;
      border: 1px solid #d7deea;
      border-radius: 10px;
      box-shadow: 0 18px 42px rgba(30, 41, 59, 0.10);
      overflow: hidden;
    }
    main::before {
      content: "";
      display: block;
      height: 3px;
      background: linear-gradient(90deg, #08756b, #38b2a5 42%, #f59e0b 100%);
    }
    section { padding: 22px; }
    h1 { margin: 0 0 16px; font-size: 20px; line-height: 1.35; }
    a {
      display: block;
      padding: 14px 15px;
      margin-top: 12px;
      border: 1px solid #d7deea;
      border-radius: 8px;
      color: #075ca8;
      text-decoration: none;
      font-weight: 700;
      background: #fbfcfe;
    }
    a:active { background: #eef6ff; }
  </style>
</head>
<body>
  <main>
    <section>
      <h1>南京铭望 H5 页面入口</h1>
      <a href="./links/">南京铭望链接</a>
      <a href="./report/">南京铭望品牌形象设计结案报告</a>
    </section>
  </main>
</body>
</html>
