<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#123f70"/>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23123f70'/%3E%3Cpath d='M20 31h24v17H20z' fill='white'/%3E%3Cpath d='M24 31v-7a8 8 0 0 1 16 0v7' fill='none' stroke='white' stroke-width='5' stroke-linecap='round'/%3E%3C/svg%3E"/>
<title>南京铭望装饰舆情优化结案报告</title>
<style>
:root {
  --bg: #eff3f6;
  --paper: #ffffff;
  --ink: #1d2f3d;
  --ink-soft: #536779;
  --line: #d3dde7;
  --brand: #123f70;
  --brand-deep: #0d2f55;
  --accent: #b64926;
  --accent-soft: #fff3ed;
  --muted: #f5f8fb;
  --ok: #2d7a5f;
}
* { box-sizing: border-box; }
html, body {
  margin: 0;
  padding: 0;
  background: radial-gradient(circle at top, #f7fafc 0, var(--bg) 52%, #e6edf3 100%);
  color: var(--ink);
  font-family: "Source Han Sans SC", "Noto Sans CJK SC", "Microsoft YaHei", "PingFang SC", sans-serif;
  font-size: 15px;
  line-height: 1.92;
  letter-spacing: 0;
  text-rendering: optimizeLegibility;
  -webkit-text-size-adjust: 100%;
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background:
    linear-gradient(120deg, rgba(18, 63, 112, 0.06), transparent 34%),
    radial-gradient(circle at 92% 8%, rgba(182, 73, 38, 0.08), transparent 24%);
}
button, input { font: inherit; }
.auth-screen {
  position: fixed;
  inset: 0;
  z-index: 20;
  display: grid;
  place-items: center;
  padding: 24px;
  background:
    linear-gradient(135deg, rgba(13, 47, 85, 0.94), rgba(18, 63, 112, 0.88)),
    radial-gradient(circle at 80% 12%, rgba(244, 169, 112, 0.24), transparent 28%);
}
.auth-card {
  width: min(430px, 100%);
  background: rgba(255,255,255,0.96);
  border: 1px solid rgba(255,255,255,0.8);
  border-radius: 18px;
  box-shadow: 0 26px 70px rgba(0, 0, 0, 0.28);
  padding: 28px;
}
.auth-mark {
  width: 44px;
  height: 44px;
  display: grid;
  place-items: center;
  color: #fff;
  background: linear-gradient(135deg, var(--brand-deep), var(--accent));
  border-radius: 12px;
  font-size: 22px;
  margin-bottom: 16px;
}
.auth-card h1 {
  margin: 0 0 8px;
  font-size: 24px;
  line-height: 1.3;
  color: #132f4a;
}
.auth-card p {
  margin: 0 0 18px;
  text-indent: 0;
  color: var(--ink-soft);
  line-height: 1.7;
}
.password-field {
  display: flex;
  gap: 8px;
  align-items: center;
  border: 1px solid #cfd9e5;
  background: #f7fafc;
  border-radius: 14px;
  padding: 9px 10px 9px 14px;
  transition: border-color .18s ease, box-shadow .18s ease, background .18s ease;
}
.password-field:focus-within {
  border-color: #3f76aa;
  background: #fff;
  box-shadow: 0 0 0 4px rgba(63, 118, 170, 0.14);
}
.password-field input {
  min-width: 0;
  flex: 1;
  border: 0;
  outline: 0;
  background: transparent;
  color: var(--ink);
}
.password-field button {
  border: 0;
  border-radius: 10px;
  padding: 8px 12px;
  color: #fff;
  background: var(--brand);
  cursor: pointer;
}
.password-field button:disabled {
  cursor: wait;
  opacity: .72;
}
.auth-error {
  min-height: 24px;
  margin: 10px 0 0;
  color: #9b2c1b;
  font-size: 13px;
}
.auth-note {
  margin-top: 14px;
  font-size: 12px;
  color: #75879a;
}
.app-shell[hidden],
.auth-screen[hidden] { display: none; }
.sheet {
  position: relative;
  width: min(210mm, 94vw);
  margin: 14px auto 24px;
  background: var(--paper);
  border: 1px solid #d6dfe9;
  box-shadow: 0 16px 36px rgba(16, 35, 58, 0.12);
  padding: calc(18mm + 20px) 15mm calc(18mm + 36px);
  overflow: hidden;
}
.sheet::before {
  content: "";
  position: absolute;
  inset: 0 0 auto;
  height: 8px;
  background: linear-gradient(90deg, var(--brand-deep), var(--brand), #4575a2, var(--accent));
}
h1, h2, h3, h4, p, li, th, td, span {
  overflow-wrap: anywhere;
  word-break: break-word;
}
h1, h2, h3, h4 {
  margin: 0;
  page-break-after: avoid;
  break-after: avoid;
}
.sheet h1 {
  font-weight: 900;
  color: #132f4a;
  text-align: center;
  font-size: 36px;
  line-height: 1.32;
  margin-bottom: 10px;
}
.sheet h1 span { display: inline; }
.subtitle {
  margin: 0 0 10px;
  text-align: center;
  text-indent: 0;
  color: #445c71;
  font-size: 14px;
}
.doc-meta {
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 6px 10px;
  padding: 8px 0;
  margin-bottom: 12px;
  font-size: 14px;
  text-align: center;
  color: #2d465e;
  text-indent: 0;
}
.doc-meta .meta-item {
  display: inline-flex;
  align-items: center;
  gap: 0.24em;
  white-space: nowrap;
}
.summary-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin: 12px 0 18px;
  text-indent: 0;
}
.summary-card {
  border: 1px solid #d6e2ee;
  border-left: 4px solid var(--brand);
  background: linear-gradient(180deg, #fbfdff, #f4f8fc);
  padding: 9px 10px;
}
.summary-card b,
.summary-value {
  display: block;
  color: #173a5d;
  font-weight: 800;
}
.summary-value { font-size: 20px; line-height: 1.35; }
.summary-card small {
  color: var(--ink-soft);
  line-height: 1.6;
}
h2 {
  font-size: 22px;
  font-weight: 900;
  color: #fff;
  background: linear-gradient(90deg, var(--brand-deep), var(--brand));
  margin-top: 22px;
  margin-bottom: 12px;
  padding: 7px 12px;
  border-radius: 4px;
  display: block;
  line-height: 1.5;
}
h3 {
  font-size: 17px;
  font-weight: 800;
  color: #173a5d;
  background: #f3f7fc;
  margin-top: 15px;
  margin-bottom: 8px;
  padding: 6px 9px;
  border-left: 4px solid #3f76aa;
  display: block;
  line-height: 1.5;
}
p {
  margin: 0 0 10px;
  text-indent: 2em;
  orphans: 3;
  widows: 3;
}
strong {
  color: #12324f;
  font-weight: 800;
}
blockquote {
  margin: 10px 0 14px;
  border-left: 4px solid var(--accent);
  background: var(--accent-soft);
  padding: 10px 12px;
  color: #31485f;
}
blockquote p,
.step-line,
.closing { text-indent: 0; }
.platform-panel {
  display: grid;
  gap: 9px;
  margin: 10px 0 16px;
}
.platform-row {
  display: grid;
  grid-template-columns: 120px 72px 1fr;
  gap: 8px 12px;
  align-items: center;
  border: 1px solid #d6e1ec;
  background: #fbfdff;
  padding: 10px 12px;
}
.platform-title { font-weight: 800; color: #173a5d; }
.platform-count { font-weight: 900; color: var(--brand); text-align: right; }
.platform-bar {
  height: 10px;
  border-radius: 999px;
  background: #e5edf5;
  overflow: hidden;
}
.platform-bar span {
  display: block;
  height: 100%;
  background: linear-gradient(90deg, #3f76aa, var(--brand));
}
.platform-row.red .platform-bar span { background: linear-gradient(90deg, #cf6b62, #b64926); }
.platform-row.orange .platform-bar span { background: linear-gradient(90deg, #d18b48, #b64926); }
.platform-row.green .platform-bar span { background: linear-gradient(90deg, #61a387, #2d7a5f); }
.platform-desc {
  grid-column: 1 / -1;
  color: #465c70;
  font-size: 14px;
  line-height: 1.65;
}
.value-block {
  border-left: 4px solid #3f76aa;
  background: #f8fbfe;
  padding: 1px 12px 4px;
  margin: 10px 0;
}
.value-block h3 {
  background: transparent;
  border-left: 0;
  padding-left: 0;
}
.law-list {
  border: 1px solid #d6e1ec;
  background: #fbfdff;
  padding: 10px 12px 2px;
  margin: 10px 0 16px;
}
.law-list p { text-indent: 0; font-size: 14px; }
.step-line {
  border: 1px solid #d6e1ec;
  background: #fbfdff;
  border-left: 4px solid #3f76aa;
  padding: 8px 10px;
  margin: 8px 0;
}
.closing {
  margin-top: 18px;
  border-top: 1px dashed #bcc9d8;
  padding-top: 10px;
  color: #4d6076;
  font-size: 13px;
  text-align: right;
}
@page { size: A4 portrait; margin: 18mm 15mm 18mm; }
@media print {
  body {
    background: #fff;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  body::before,
  .auth-screen { display: none; }
  .sheet {
    width: auto;
    margin: 0;
    border: none;
    box-shadow: none;
    padding: 0;
  }
}
@media screen and (max-width: 900px) {
  html, body {
    font-size: 15px;
    line-height: 1.95;
    background: linear-gradient(180deg, #edf3f9 0, #f7fafd 140px, #edf3f8 100%);
  }
  body::before {
    background: linear-gradient(180deg, rgba(18, 63, 112, 0.06), transparent 160px);
  }
  .auth-card { padding: 24px 20px; border-radius: 16px; }
  .auth-card h1 { font-size: 21px; }
  .sheet {
    width: 100%;
    min-height: 100dvh;
    margin: 0;
    border: none;
    box-shadow: none;
    border-radius: 0;
    padding: calc(env(safe-area-inset-top) + 28px) max(16px, env(safe-area-inset-right)) calc(env(safe-area-inset-bottom) + 88px) max(16px, env(safe-area-inset-left));
  }
  .sheet::before { height: 6px; }
  .sheet h1 {
    font-size: clamp(22px, 7vw, 29px);
    line-height: 1.24;
    text-align: left;
    margin-bottom: 12px;
  }
  .sheet h1 span { display: block; }
  .subtitle,
  .doc-meta { text-align: left; }
  .subtitle {
    font-size: 13px;
    line-height: 1.75;
    margin-bottom: 8px;
  }
  .doc-meta {
    font-size: 12.5px;
    line-height: 1.8;
    margin-bottom: 14px;
    justify-content: flex-start;
  }
  .summary-grid {
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .summary-card,
  .platform-row,
  .value-block,
  .law-list,
  .step-line,
  blockquote {
    border-radius: 14px;
    box-shadow: 0 6px 14px rgba(20, 44, 71, 0.06);
  }
  h2 {
    font-size: 18px;
    margin-top: 20px;
    margin-bottom: 10px;
    padding: 10px 11px;
    border-radius: 12px;
    line-height: 1.45;
  }
  h3 {
    font-size: 15px;
    margin-top: 14px;
    margin-bottom: 8px;
    padding: 8px 9px;
    border-radius: 10px;
    line-height: 1.55;
  }
  p {
    text-indent: 0;
    margin-bottom: 13px;
    line-height: 1.95;
  }
  .platform-row {
    grid-template-columns: 1fr auto;
  }
  .platform-bar { grid-column: 1 / -1; }
  .platform-desc { font-size: 13px; }
}
@media screen and (max-width: 480px) {
  html, body { font-size: 14px; }
  .sheet h1 { font-size: clamp(21px, 7.4vw, 26px); }
  h2 { font-size: 16px; padding: 9px 10px; }
  h3 { font-size: 14px; }
  .subtitle, .doc-meta { font-size: 12px; }
  .summary-grid { grid-template-columns: 1fr; }
  .summary-value { font-size: 18px; }
}
</style>
</head>

  </div>
</section>
<div class="app-shell" id="app" hidden></div>

function decodeBase64(value) {
  const binary = atob(value);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i += 1) bytes[i] = binary.charCodeAt(i);
  return bytes;
}

async function decryptHtml(password) {
  const encoder = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    "raw",
    encoder.encode(password),
    "PBKDF2",
    false,
    ["deriveKey"]
  );
  const key = await crypto.subtle.deriveKey(
    {
      name: "PBKDF2",
      salt: decodeBase64(ENCRYPTED_PAYLOAD.salt),
      iterations: ENCRYPTED_PAYLOAD.iterations,
      hash: "SHA-256"
    },
    keyMaterial,
    { name: "AES-GCM", length: 256 },
    false,
    ["decrypt"]
  );
  const plain = await crypto.subtle.decrypt(
    { name: "AES-GCM", iv: decodeBase64(ENCRYPTED_PAYLOAD.iv) },
    key,
    decodeBase64(ENCRYPTED_PAYLOAD.data)
  );
  return new TextDecoder().decode(plain);
}

const form = document.getElementById("auth-form");
const input = document.getElementById("password-input");
const button = document.getElementById("unlock-button");
const error = document.getElementById("auth-error");
const app = document.getElementById("app");
const auth = document.getElementById("auth-screen");
requestAnimationFrame(() => input.focus());

form.addEventListener("submit", async (event) => {
  event.preventDefault();
  const password = input.value.trim();
  if (!password) {
    error.textContent = "请输入访问密码。";
    input.focus();
    return;
  }
  button.disabled = true;
  button.textContent = "解锁中";
  error.textContent = "";
  try {
    app.innerHTML = await decryptHtml(password);
    app.hidden = false;
    auth.hidden = true;
    document.title = "南京铭望装饰舆情优化结案报告";
    window.scrollTo({ top: 0, behavior: "instant" });
  } catch (err) {
    app.innerHTML = "";
    app.hidden = true;
    error.textContent = "密码不正确，请核对后重试。";
    input.select();
  } finally {
    button.disabled = false;
    button.textContent = "解锁";
  }
});
