<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#123f70">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23123f70'/%3E%3Cpath d='M20 31h24v17H20z' fill='white'/%3E%3Cpath d='M24 31v-7a8 8 0 0 1 16 0v7' fill='none' stroke='white' stroke-width='5' stroke-linecap='round'/%3E%3C/svg%3E">
  <title>项目失效链接统计</title>
  <style>
    :root {
      --bg: #eff3f6;
      --paper: #ffffff;
      --ink: #1d2f3d;
      --ink-soft: #536779;
      --line: #d3dde7;
      --brand: #123f70;
      --brand-deep: #0d2f55;
      --accent: #b64926;
      --accent-soft: #fff3ed;
      --muted: #f5f8fb;
      --ok: #2d7a5f;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at top, #f7fafc 0, var(--bg) 52%, #e6edf3 100%);
      color: var(--ink);
      font-family: "Source Han Sans SC", "Noto Sans CJK SC", "Microsoft YaHei", "PingFang SC", sans-serif;
      font-size: 15px;
      line-height: 1.92;
      letter-spacing: 0;
      text-rendering: optimizeLegibility;
      -webkit-text-size-adjust: 100%;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(120deg, rgba(18, 63, 112, 0.06), transparent 34%),
        radial-gradient(circle at 92% 8%, rgba(182, 73, 38, 0.08), transparent 24%);
    }
    button, input { font: inherit; }
    .auth-screen {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        linear-gradient(135deg, rgba(13, 47, 85, 0.94), rgba(18, 63, 112, 0.88)),
        radial-gradient(circle at 80% 12%, rgba(244, 169, 112, 0.24), transparent 28%);
    }
    .auth-card {
      width: min(430px, 100%);
      background: rgba(255,255,255,0.96);
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: 18px;
      box-shadow: 0 26px 70px rgba(0, 0, 0, 0.28);
      padding: 28px;
    }
    .auth-mark {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      color: #fff;
      background: linear-gradient(135deg, var(--brand-deep), var(--accent));
      border-radius: 12px;
      font-size: 22px;
      margin-bottom: 16px;
    }
    .auth-card h1 {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.3;
      color: #132f4a;
    }
    .auth-card p {
      margin: 0 0 18px;
      text-indent: 0;
      color: var(--ink-soft);
      line-height: 1.7;
    }
    .password-field {
      display: flex;
      gap: 8px;
      align-items: center;
      border: 1px solid #cfd9e5;
      background: #f7fafc;
      border-radius: 14px;
      padding: 9px 10px 9px 14px;
      transition: border-color .18s ease, box-shadow .18s ease, background .18s ease;
    }
    .password-field:focus-within {
      border-color: #3f76aa;
      background: #fff;
      box-shadow: 0 0 0 4px rgba(63, 118, 170, 0.14);
    }
    .password-field input {
      min-width: 0;
      flex: 1;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--ink);
    }
    .password-field button {
      border: 0;
      border-radius: 10px;
      padding: 8px 12px;
      color: #fff;
      background: var(--brand);
      cursor: pointer;
    }
    .password-field button:disabled {
      cursor: wait;
      opacity: .72;
    }
    .auth-error {
      min-height: 24px;
      margin: 10px 0 0;
      color: #9b2c1b;
      font-size: 13px;
    }
    .auth-note {
      margin-top: 14px;
      font-size: 12px;
      color: #75879a;
    }
    .app-shell[hidden],
    .auth-screen[hidden] { display: none; }
    @media screen and (max-width: 900px) {
      html, body {
        font-size: 15px;
        line-height: 1.95;
        background: linear-gradient(180deg, #edf3f9 0, #f7fafd 140px, #edf3f8 100%);
      }
      body::before {
        background: linear-gradient(180deg, rgba(18, 63, 112, 0.06), transparent 160px);
      }
      .auth-card { padding: 24px 20px; border-radius: 16px; }
      .auth-card h1 { font-size: 21px; }
    }
    @media screen and (max-width: 480px) {
      html, body { font-size: 14px; }
    }
  </style>
</head>
<body>
<section class="auth-screen" id="auth-screen" aria-labelledby="auth-title">
  <div class="auth-card">
    <div class="auth-mark" aria-hidden="true">锁</div>
    <h1 id="auth-title">my优化数据</h1>
    <p>该页面已加密保护。请输入访问密码后查看完整内容。</p>
    <form id="auth-form" autocomplete="off">
      <input type="text" name="username" autocomplete="username" value="viewer" hidden>
      <label class="password-field">
        <input id="password-input" name="password" type="password" inputmode="text" autocomplete="new-password" placeholder="请输入访问密码" aria-label="访问密码">
        <button id="unlock-button" type="submit">解锁</button>
      </label>
      <div class="auth-error" id="auth-error" role="status" aria-live="polite"></div>
    </form>
    <div class="auth-note">仅限授权人员查看，请勿外传。</div>
  </div>
</section>
<div class="app-shell" id="app" hidden></div>

function decodeBase64(value) {
  const binary = atob(value);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i += 1) bytes[i] = binary.charCodeAt(i);
  return bytes;
}

async function decryptHtml(password) {
  const encoder = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    "raw",
    encoder.encode(password),
    "PBKDF2",
    false,
    ["deriveKey"]
  );
  const key = await crypto.subtle.deriveKey(
    {
      name: "PBKDF2",
      salt: decodeBase64(ENCRYPTED_PAYLOAD.salt),
      iterations: ENCRYPTED_PAYLOAD.iterations,
      hash: "SHA-256"
    },
    keyMaterial,
    { name: "AES-GCM", length: 256 },
    false,
    ["decrypt"]
  );
  const plain = await crypto.subtle.decrypt(
    { name: "AES-GCM", iv: decodeBase64(ENCRYPTED_PAYLOAD.iv) },
    key,
    decodeBase64(ENCRYPTED_PAYLOAD.data)
  );
  return new TextDecoder().decode(plain);
}

function runInjectedScripts(container) {
  const scripts = Array.from(container.querySelectorAll("script"));
  for (const oldScript of scripts) {
    const script = document.createElement("script");
    for (const attr of oldScript.attributes) script.setAttribute(attr.name, attr.value);
    script.textContent = oldScript.textContent;
    oldScript.replaceWith(script);
  }
}

const form = document.getElementById("auth-form");
const input = document.getElementById("password-input");
const button = document.getElementById("unlock-button");
const error = document.getElementById("auth-error");
const app = document.getElementById("app");
const auth = document.getElementById("auth-screen");
requestAnimationFrame(() => input.focus());

form.addEventListener("submit", async (event) => {
  event.preventDefault();
  const password = input.value.trim();
  if (!password) {
    error.textContent = "请输入访问密码。";
    input.focus();
    return;
  }
  button.disabled = true;
  button.textContent = "解锁中";
  error.textContent = "";
  try {
    app.innerHTML = await decryptHtml(password);
    runInjectedScripts(app);
    app.hidden = false;
    auth.hidden = true;
    document.title = "项目失效链接统计";
    window.scrollTo({ top: 0, behavior: "instant" });
  } catch (err) {
    app.innerHTML = "";
    app.hidden = true;
    error.textContent = "密码不正确，请核对后重试。";
    input.select();
  } finally {
    button.disabled = false;
    button.textContent = "解锁";
  }
});
</script>
